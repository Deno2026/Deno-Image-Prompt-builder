<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Prompt Master V2 (260418)</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #050a07;
      --line: rgba(92, 255, 145, 0.14);
      --line-strong: rgba(92, 255, 145, 0.28);
      --text: #effaf1;
      --sub: #9dc3a8;
      --accent: #56ff8f;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 18px 52px rgba(0, 0, 0, 0.24);
      --radius-xl: 34px;
      --radius-lg: 26px;
    }

    * { box-sizing: border-box; }

    a,
    button {
      touch-action: manipulation;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 2px solid rgba(86, 255, 143, 0.72);
      outline-offset: 3px;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at 12% 14%, rgba(86, 255, 143, 0.09), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(86, 255, 143, 0.06), transparent 22%),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03), transparent 26%),
        linear-gradient(180deg, #030604 0%, #050a07 38%, #040906 100%);
      color: var(--text);
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.03), transparent 10%),
        radial-gradient(circle at 75% 34%, rgba(86, 255, 143, 0.04), transparent 13%);
    }

    body::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.016) 0,
          rgba(255, 255, 255, 0.016) 1px,
          transparent 1px,
          transparent 140px
        );
      opacity: 0.24;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1500px, calc(100vw - 56px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 0 40px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 26px;
      padding: 14px 16px;
      border-radius: 28px;
      border: 1px solid rgba(92, 255, 145, 0.12);
      background:
        linear-gradient(180deg, rgba(10, 18, 13, 0.86), rgba(6, 11, 8, 0.92)),
        linear-gradient(135deg, rgba(86, 255, 143, 0.04), transparent 56%);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand-mark {
      width: 70px;
      height: 70px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--accent);
      background:
        linear-gradient(180deg, rgba(15, 26, 18, 0.96), rgba(8, 14, 10, 0.98)),
        linear-gradient(135deg, rgba(86, 255, 143, 0.06), transparent 54%);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), var(--shadow);
    }

    .brand-copy strong {
      display: block;
      font-size: clamp(2rem, 4vw, 3.7rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
      font-weight: 900;
      padding-bottom: 0.12em;
      text-wrap: balance;
    }

    .pill {
      text-decoration: none;
      color: var(--text);
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(10, 18, 13, 0.92);
      font-weight: 800;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .pill:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      background: rgba(12, 23, 16, 0.98);
    }

    .youtube-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .youtube-icon {
      position: relative;
      width: 18px;
      height: 13px;
      border-radius: 4px;
      background: #ff3b30;
      display: inline-block;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .youtube-icon::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 3px;
      border-top: 3.5px solid transparent;
      border-bottom: 3.5px solid transparent;
      border-left: 6px solid #fff;
    }

    .card-grid {
      margin: auto 0;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.96fr) minmax(0, 0.96fr);
      gap: 24px;
      align-items: stretch;
    }

    .entry-card {
      display: block;
      text-decoration: none;
      color: inherit;
      min-height: 520px;
      padding: 26px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(92, 255, 145, 0.12);
      background:
        linear-gradient(180deg, rgba(10, 18, 13, 0.9), rgba(6, 11, 8, 0.95)),
        linear-gradient(135deg, rgba(86, 255, 143, 0.04), transparent 52%);
      box-shadow: 0 20px 54px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      backdrop-filter: blur(16px);
      position: relative;
    }

    .entry-card:hover {
      transform: translateY(-6px);
      border-color: var(--line-strong);
      box-shadow: 0 34px 92px rgba(0, 0, 0, 0.42);
    }

    .entry-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 22%);
      pointer-events: none;
    }

    .entry-card:first-child {
      min-height: 560px;
    }

    .thumb {
      height: 300px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background-color: #101813;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      margin-bottom: 26px;
      position: relative;
      overflow: hidden;
    }

    .thumb--media {
      background: #101813;
    }

    .thumb--media::before,
    .thumb--media::after {
      content: none;
    }

    .thumb--media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      filter: saturate(1.05) contrast(1.02);
      transform: scale(1.015);
    }

    .thumb::before,
    .thumb::after {
      content: "";
      position: absolute;
      border-radius: 28px;
    }

    .thumb.image {
      background:
        radial-gradient(circle at 38% 34%, rgba(255, 214, 171, 0.72), transparent 18%),
        linear-gradient(180deg, #304333 0%, #17231b 100%);
    }

    .thumb.image::before {
      width: 168px;
      height: 168px;
      left: 38px;
      bottom: 50px;
      border-radius: 50%;
      background: linear-gradient(180deg, #e1b48d 0%, #c18f67 100%);
    }

    .thumb.image::after {
      width: 126px;
      height: 126px;
      right: 30px;
      bottom: 34px;
      background: rgba(255, 255, 255, 0.08);
    }

    .thumb.video {
      background:
        radial-gradient(circle at 74% 30%, rgba(121, 169, 255, 0.22), transparent 16%),
        linear-gradient(180deg, #24324f 0%, #101721 100%);
    }

    .thumb.video::before {
      width: 182px;
      height: 138px;
      left: 42px;
      bottom: 44px;
      background: linear-gradient(180deg, #3f4e68 0%, #161d28 100%);
    }

    .thumb.video::after {
      right: 42px;
      top: 46px;
      width: 0;
      height: 0;
      border-top: 28px solid transparent;
      border-bottom: 28px solid transparent;
      border-left: 42px solid rgba(255, 255, 255, 0.82);
      border-radius: 4px;
    }

    .thumb.tts {
      background:
        radial-gradient(circle at 80% 44%, rgba(255, 171, 97, 0.18), transparent 18%),
        linear-gradient(180deg, #4a2f23 0%, #1a110d 100%);
    }

    .thumb.tts::before {
      width: 126px;
      height: 176px;
      left: 42px;
      bottom: 34px;
      background: rgba(255, 255, 255, 0.09);
    }

    .thumb.tts::after {
      width: 88px;
      height: 24px;
      right: 44px;
      bottom: 72px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.68) 0 22%, rgba(255,255,255,0.68) 30% 52%, rgba(255,255,255,0.68) 60% 100%);
    }

    .entry-title {
      font-size: clamp(2rem, 2.8vw, 2.6rem);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }

    .entry-desc {
      color: var(--sub);
      font-size: 1.08rem;
      line-height: 1.7;
      min-height: 116px;
    }

    .entry-meta {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(86, 255, 143, 0.16);
      background: rgba(86, 255, 143, 0.08);
      color: #dfffe8;
      font-size: 0.98rem;
      font-weight: 800;
    }

    @media (max-width: 1080px) {
      .shell {
        width: min(100vw - 28px, 920px);
        padding-top: 18px;
      }

      .card-grid {
        grid-template-columns: 1fr;
        margin-top: 42px;
        margin-bottom: 10px;
      }

      .entry-card {
        min-height: auto;
      }
    }

    @media (max-width: 700px) {
      .shell {
        width: min(100vw - 20px, 100%);
        min-height: 100vh;
        padding: 12px 0 14px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .brand {
        align-items: flex-start;
        gap: 14px;
      }

      .brand-mark {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        font-size: 1.8rem;
      }

      .brand-copy strong {
        font-size: clamp(1.7rem, 10vw, 2.6rem);
        line-height: 1.05;
        padding-bottom: 0.12em;
      }

      .pill {
        width: 100%;
        justify-content: center;
        min-height: 46px;
        padding: 0 16px;
      }

      .card-grid {
        margin: 10px 0 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        align-content: stretch;
        flex: 1;
      }

      .entry-card {
        padding: 14px;
        border-radius: 22px;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .thumb {
        height: 112px;
        border-radius: 18px;
        margin-bottom: 14px;
      }

      .entry-title {
        font-size: clamp(1.18rem, 4.6vw, 1.5rem);
        margin-bottom: 8px;
      }

      .entry-desc {
        font-size: 0.82rem;
        line-height: 1.45;
        min-height: 0;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .entry-meta {
        margin-top: auto;
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.84rem;
      }
    }

    @media (max-width: 460px) {
      .shell {
        width: min(100vw - 16px, 100%);
        min-height: 100vh;
        padding: 10px 0 12px;
      }

      .brand {
        width: 100%;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        font-size: 1.55rem;
      }

      .brand-copy strong {
        font-size: clamp(1.38rem, 8.5vw, 1.96rem);
        line-height: 1.12;
        padding-top: 0.03em;
        padding-bottom: 0.16em;
      }

      .topbar {
        gap: 8px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 6px 0 0;
        align-content: start;
      }

      .thumb {
        height: 98px;
        margin-bottom: 12px;
      }

      .thumb.image::before,
      .thumb.video::before,
      .thumb.tts::before {
        left: 18px;
        bottom: 16px;
        width: 72px;
        height: 72px;
      }

      .thumb.image::after,
      .thumb.tts::after {
        right: 18px;
        bottom: 16px;
        width: 54px;
        height: 54px;
      }

      .thumb.video::after {
        right: 20px;
        top: 24px;
        border-top-width: 16px;
        border-bottom-width: 16px;
        border-left-width: 24px;
      }

      .thumb.video::before {
        left: 20px;
        bottom: 16px;
        width: 86px;
        height: 68px;
      }

      .entry-card {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        grid-template-areas:
          "thumb title"
          "thumb desc"
          "thumb meta";
        align-items: start;
        column-gap: 12px;
        row-gap: 6px;
        padding: 12px;
        min-height: 0;
      }

      .entry-card .thumb {
        grid-area: thumb;
        margin-bottom: 0;
      }

      .entry-title {
        grid-area: title;
        align-self: end;
      }

      .entry-title {
        font-size: 0.98rem;
      }

      .entry-desc {
        grid-area: desc;
        font-size: 0.73rem;
        line-height: 1.38;
        -webkit-line-clamp: 2;
        min-height: 0;
      }

      .entry-meta {
        grid-area: meta;
        margin-top: 2px;
        min-height: 34px;
        font-size: 0.78rem;
        width: fit-content;
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">D</div>
        <div class="brand-copy">
          <strong>Simple Prompt Master V2 (260418)</strong>
        </div>
      </div>
      <a class="pill youtube-link" href="https://www.youtube.com/@Denoise-AI" target="_blank" rel="noreferrer">
        <span class="youtube-icon" aria-hidden="true"></span>
        <span>Deno YouTube</span>
      </a>
    </div>

    <section class="card-grid" aria-label="Prompt builder entries">
      <a class="entry-card" href="image.html">
        <div class="thumb thumb--media" aria-hidden="true">
          <img src="assets/cards/home/main/home-image-builder.webp" alt="" width="448" height="448" loading="eager" decoding="async" />
        </div>
        <div class="entry-title">이미지 생성기</div>
        <div class="entry-desc">
          원하는 사진 방향을 하나씩 고르면서 마지막에 바로 복사할 수 있는 지시문까지 정리하는 흐름입니다.
        </div>
        <div class="entry-meta">지금 바로 사용 가능</div>
      </a>

      <a class="entry-card" href="video.html">
        <div class="thumb thumb--media" aria-hidden="true">
          <img src="assets/cards/home/main/home-video-builder.webp" alt="" width="448" height="448" loading="lazy" decoding="async" />
        </div>
        <div class="entry-title">동영상 생성기</div>
        <div class="entry-desc">
          장면, 움직임, 카메라 흐름을 더 쉽게 정리할 수 있도록 별도 흐름으로 이어질 페이지입니다.
        </div>
        <div class="entry-meta">연결만 먼저 준비</div>
      </a>

      <a class="entry-card" href="tts.html">
        <div class="thumb thumb--media" aria-hidden="true">
          <img src="assets/cards/home/main/home-tts-builder.webp" alt="" width="448" height="448" loading="lazy" decoding="async" />
        </div>
        <div class="entry-title">TTS / 가사 생성기</div>
        <div class="entry-desc">
          TTS용 대본과 말투 가이드, Suno 등에 넣기 좋은 가사 아이디어를 쉽게 정리할 수 있도록 준비할 예정입니다.
        </div>
        <div class="entry-meta">다음 확장 예정</div>
      </a>
    </section>
  </main>
</body>
</html>
