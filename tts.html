<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Prompt Master - TTS / 오디오 준비중</title>
  <meta
    name="description"
    content="Simple Prompt Master TTS / 오디오 항목은 준비중입니다. 현재는 이미지 생성기와 동영상 생성기를 사용할 수 있습니다."
  />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #050704;
      --text: #f4fff7;
      --sub: #b1c8b7;
      --muted: #84a18b;
      --line: rgba(96, 255, 154, 0.14);
      --line-strong: rgba(96, 255, 154, 0.3);
      --accent: #60ff9a;
      --shadow: 0 28px 86px rgba(0, 0, 0, 0.46);
      --shadow-soft: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(96, 255, 154, 0.1), transparent 18%),
        radial-gradient(circle at 88% 6%, rgba(244, 177, 93, 0.1), transparent 19%),
        linear-gradient(180deg, #020403 0%, #070d08 46%, #040604 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent 22%),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.016) 0,
          rgba(255, 255, 255, 0.016) 1px,
          transparent 1px,
          transparent 126px
        );
      opacity: 0.24;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 2px solid rgba(96, 255, 154, 0.72);
      outline-offset: 3px;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1440px, calc(100vw - 56px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 0 46px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 14px 16px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(10, 18, 13, 0.88), rgba(6, 11, 8, 0.94)),
        linear-gradient(135deg, rgba(96, 255, 154, 0.05), transparent 54%);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .mode-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .home-pill,
    .mode-pill,
    .pill-btn,
    .primary-link {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 20, 14, 0.95), rgba(6, 11, 8, 0.98));
      color: var(--text);
      border-radius: 999px;
      min-height: 50px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .home-pill:hover,
    .mode-pill:hover,
    .pill-btn:hover,
    .primary-link:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
    }

    .home-pill {
      width: 52px;
      min-width: 52px;
      padding: 0;
      font-size: 1.3rem;
    }

    .mode-pill.active,
    .primary-link {
      background: rgba(96, 255, 154, 0.11);
      border-color: rgba(96, 255, 154, 0.28);
      color: #eaffef;
    }

    .youtube-link {
      gap: 10px;
    }

    .youtube-icon {
      position: relative;
      width: 18px;
      height: 13px;
      border-radius: 4px;
      background: #ff3b30;
      display: inline-block;
      flex-shrink: 0;
    }

    .youtube-icon::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 3px;
      border-top: 3.5px solid transparent;
      border-bottom: 3.5px solid transparent;
      border-left: 6px solid #fff;
    }

    .soon-card {
      align-self: center;
      border-radius: 34px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(96, 255, 154, 0.08), transparent 24%),
        radial-gradient(circle at 84% 4%, rgba(244, 177, 93, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(9, 17, 11, 0.96), rgba(4, 9, 6, 0.985));
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 64px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.72fr);
      gap: 34px;
      align-items: center;
      overflow: hidden;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(96, 255, 154, 0.24);
      background: rgba(96, 255, 154, 0.08);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      margin-top: 18px;
      max-width: 12ch;
      font-size: clamp(2.7rem, 6.8vw, 6.4rem);
      line-height: 0.96;
      letter-spacing: -0.065em;
      word-break: keep-all;
    }

    .lead {
      max-width: 740px;
      margin-top: 22px;
      color: #c1d8c7;
      font-size: clamp(1rem, 1.4vw, 1.14rem);
      line-height: 1.72;
      word-break: keep-all;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .status-panel {
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .status-panel h2 {
      font-size: clamp(1.32rem, 2vw, 1.9rem);
      letter-spacing: -0.04em;
      word-break: keep-all;
    }

    .status-panel p {
      color: var(--sub);
      line-height: 1.68;
      word-break: keep-all;
    }

    .status-list {
      display: grid;
      gap: 10px;
    }

    .status-item {
      border-radius: 18px;
      border: 1px solid rgba(96, 255, 154, 0.12);
      background: rgba(9, 17, 11, 0.82);
      padding: 13px 15px;
      color: #eefaf1;
      font-weight: 800;
      line-height: 1.42;
    }

    @media (max-width: 920px) {
      .shell {
        width: min(100vw - 22px, 720px);
        padding: 14px 0 28px;
      }

      .topbar {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
      }

      .youtube-link {
        justify-self: end;
      }

      .mode-links {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }

      .soon-card {
        grid-template-columns: 1fr;
        padding: 26px 18px;
      }

      h1 {
        max-width: 11ch;
        font-size: clamp(2.4rem, 12vw, 4.4rem);
      }
    }

    @media (max-width: 520px) {
      .topbar {
        border-radius: 24px;
      }

      .home-pill,
      .mode-pill,
      .pill-btn,
      .primary-link {
        min-height: 44px;
        padding: 0 13px;
        font-size: 0.88rem;
      }

      .youtube-link {
        justify-self: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="home-pill" href="index.html" aria-label="메인으로">⌂</a>

      <nav class="mode-links" aria-label="생성기 이동">
        <a class="mode-pill" href="image.html">이미지 생성</a>
        <a class="mode-pill" href="video.html">동영상 생성</a>
        <span class="mode-pill active" aria-current="page">TTS / 오디오 준비중</span>
      </nav>

      <a class="pill-btn youtube-link" href="https://www.youtube.com/@Denoise-AI" target="_blank" rel="noreferrer">
        <span class="youtube-icon" aria-hidden="true"></span>
        <span>Deno YouTube</span>
      </a>
    </header>

    <section class="soon-card">
      <div>
        <span class="eyebrow">Coming Soon</span>
        <h1>TTS / 오디오 항목은 준비중입니다</h1>
        <p class="lead">
          오디오 영역은 모델별 입력 방식과 상담 흐름을 조금 더 다듬은 뒤 공개할 예정입니다. 지금은 안정적으로 정리된 이미지 생성기와 동영상 생성기를 먼저 사용해주세요.
        </p>
        <div class="actions">
          <a class="primary-link" href="image.html">이미지 생성기 열기</a>
          <a class="mode-pill" href="video.html">동영상 생성기 열기</a>
        </div>
      </div>

      <div class="status-panel">
        <h2>현재 공개된 도구</h2>
        <p>GitHub Pages에는 당분간 이미지와 동영상 프롬프트 빌더만 노출합니다.</p>
        <div class="status-list">
          <div class="status-item">이미지 생성기: 사용 가능</div>
          <div class="status-item">동영상 생성기: 사용 가능</div>
          <div class="status-item">TTS / 오디오: 준비중</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
