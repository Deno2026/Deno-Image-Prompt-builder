<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Prompt Master - TTS / 음악 생성기</title>
  <meta
    name="description"
    content="Simple Prompt Master TTS / 음악 생성기. TTS 대본, 말투 가이드, 가사와 음악 프롬프트를 클릭 흐름으로 정리하고 LLM 상담형 지시문을 복사합니다."
  />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #050704;
      --panel: #08100a;
      --panel-soft: #0d1710;
      --text: #f4fff7;
      --sub: #b1c8b7;
      --muted: #84a18b;
      --line: rgba(96, 255, 154, 0.14);
      --line-strong: rgba(96, 255, 154, 0.3);
      --accent: #60ff9a;
      --amber: #f4b15d;
      --amber-soft: rgba(244, 177, 93, 0.14);
      --shadow: 0 28px 86px rgba(0, 0, 0, 0.46);
      --shadow-soft: 0 18px 48px rgba(0, 0, 0, 0.28);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(96, 255, 154, 0.1), transparent 18%),
        radial-gradient(circle at 88% 6%, rgba(244, 177, 93, 0.12), transparent 19%),
        linear-gradient(180deg, #020403 0%, #070d08 46%, #040604 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent 22%),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.016) 0,
          rgba(255, 255, 255, 0.016) 1px,
          transparent 1px,
          transparent 126px
        );
      opacity: 0.24;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      appearance: none;
      -webkit-appearance: none;
      color: inherit;
      cursor: pointer;
    }

    a,
    button,
    textarea {
      touch-action: manipulation;
    }

    a:focus-visible,
    button:focus-visible,
    textarea:focus-visible,
    summary:focus-visible {
      outline: 2px solid rgba(96, 255, 154, 0.72);
      outline-offset: 3px;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1440px, calc(100vw - 56px));
      margin: 0 auto;
      padding: 18px 0 46px;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      padding: 14px 16px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(10, 18, 13, 0.88), rgba(6, 11, 8, 0.94)),
        linear-gradient(135deg, rgba(96, 255, 154, 0.05), transparent 54%);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .mode-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .home-pill,
    .mode-pill,
    .pill-btn,
    .ghost-btn,
    .copy-btn,
    .step-badge {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 20, 14, 0.95), rgba(6, 11, 8, 0.98));
      color: var(--text);
      border-radius: 999px;
      min-height: 50px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .home-pill:hover,
    .mode-pill:hover,
    .pill-btn:hover,
    .ghost-btn:hover,
    .copy-btn:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
    }

    .home-pill {
      width: 52px;
      min-width: 52px;
      padding: 0;
      font-size: 1.3rem;
    }

    .mode-pill.active,
    .copy-btn.primary,
    .step-badge {
      background: rgba(96, 255, 154, 0.11);
      border-color: rgba(96, 255, 154, 0.28);
      color: #eaffef;
    }

    .youtube-link {
      gap: 10px;
    }

    .youtube-icon {
      position: relative;
      width: 18px;
      height: 13px;
      border-radius: 4px;
      background: #ff3b30;
      display: inline-block;
      flex-shrink: 0;
    }

    .youtube-icon::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 3px;
      border-top: 3.5px solid transparent;
      border-bottom: 3.5px solid transparent;
      border-left: 6px solid #fff;
    }

    .floating-back {
      position: fixed;
      left: clamp(26px, 4vw, 72px);
      top: 142px;
      width: 72px;
      height: 72px;
      border-radius: 24px;
      border: 1px solid rgba(96, 255, 154, 0.22);
      background:
        linear-gradient(180deg, rgba(10, 18, 13, 0.96), rgba(5, 9, 7, 0.98)),
        linear-gradient(135deg, rgba(96, 255, 154, 0.08), transparent 60%);
      color: var(--text);
      font-size: 1.65rem;
      font-weight: 900;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      z-index: 12;
    }

    .floating-back.hidden {
      display: none;
    }

    .screen {
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(96, 255, 154, 0.08), transparent 24%),
        radial-gradient(circle at 84% 4%, rgba(244, 177, 93, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(9, 17, 11, 0.96), rgba(4, 9, 6, 0.985));
      box-shadow: var(--shadow);
      padding: 34px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .screen.hidden {
      display: none !important;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(96, 255, 154, 0.24);
      background: rgba(96, 255, 154, 0.08);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: -0.045em;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(360px, 0.72fr);
      gap: 26px;
      align-items: stretch;
    }

    .hero-copy-wrap {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
      min-height: 430px;
    }

    .hero-title {
      margin-top: 16px;
      max-width: 15ch;
      font-size: clamp(2.4rem, 5.2vw, 5.6rem);
      line-height: 0.96;
      letter-spacing: -0.065em;
      text-wrap: balance;
    }

    .hero-copy,
    .step-copy,
    .option-desc,
    .helper,
    .system-box,
    textarea {
      color: var(--sub);
      line-height: 1.7;
    }

    .hero-copy {
      max-width: 760px;
      margin: 18px 0 0;
      font-size: 1rem;
      color: #c1d8c7;
    }

    .hero-media {
      min-height: 430px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
      background: #11180f;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .hero-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.04) contrast(1.03);
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent 52%, rgba(0, 0, 0, 0.44)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.22), transparent 42%);
      pointer-events: none;
    }

    .signal-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .signal {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.035);
      padding: 14px;
    }

    .signal strong {
      display: block;
      margin-bottom: 5px;
      color: #eaffef;
      font-size: 0.95rem;
      line-height: 1.28;
    }

    .signal span {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .mode-grid,
    .cards-grid,
    .result-layout {
      display: grid;
      gap: 18px;
    }

    .mode-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 26px;
    }

    .cards-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 28px;
    }

    .choice-card,
    .option-card,
    .summary-card,
    .result-box {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(96, 255, 154, 0.12);
      background:
        linear-gradient(180deg, rgba(10, 18, 13, 0.91), rgba(5, 10, 7, 0.96)),
        linear-gradient(135deg, rgba(96, 255, 154, 0.04), transparent 56%);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(14px);
    }

    .choice-card,
    .option-card {
      padding: 18px;
      display: grid;
      gap: 12px;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .choice-card:hover,
    .option-card:hover {
      transform: translateY(-4px);
      border-color: var(--line-strong);
      box-shadow: 0 28px 64px rgba(0, 0, 0, 0.32);
    }

    .card-thumb {
      position: relative;
      height: 156px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 40%, rgba(244, 177, 93, 0.2), transparent 18%),
        linear-gradient(180deg, #203426, #101710);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .card-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.02);
      transform: scale(1.01);
    }

    .card-thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.38));
      z-index: 1;
    }

    .visualizer {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 22px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 5px;
      align-items: end;
      height: 68px;
    }

    .visualizer span {
      display: block;
      border-radius: 999px 999px 5px 5px;
      background: linear-gradient(180deg, rgba(244, 177, 93, 0.95), rgba(96, 255, 154, 0.76));
      box-shadow: 0 0 18px rgba(96, 255, 154, 0.18);
    }

    .voice .visualizer span:nth-child(1) { height: 26%; }
    .voice .visualizer span:nth-child(2) { height: 44%; }
    .voice .visualizer span:nth-child(3) { height: 72%; }
    .voice .visualizer span:nth-child(4) { height: 38%; }
    .voice .visualizer span:nth-child(5) { height: 58%; }
    .voice .visualizer span:nth-child(6) { height: 86%; }
    .voice .visualizer span:nth-child(7) { height: 48%; }
    .voice .visualizer span:nth-child(8) { height: 64%; }
    .voice .visualizer span:nth-child(9) { height: 34%; }
    .voice .visualizer span:nth-child(10) { height: 76%; }
    .voice .visualizer span:nth-child(11) { height: 42%; }
    .voice .visualizer span:nth-child(12) { height: 68%; }
    .voice .visualizer span:nth-child(13) { height: 52%; }
    .voice .visualizer span:nth-child(14) { height: 88%; }
    .voice .visualizer span:nth-child(15) { height: 46%; }
    .voice .visualizer span:nth-child(16) { height: 62%; }
    .voice .visualizer span:nth-child(17) { height: 36%; }
    .voice .visualizer span:nth-child(18) { height: 54%; }

    .lyrics .visualizer span:nth-child(1) { height: 78%; }
    .lyrics .visualizer span:nth-child(2) { height: 34%; }
    .lyrics .visualizer span:nth-child(3) { height: 58%; }
    .lyrics .visualizer span:nth-child(4) { height: 82%; }
    .lyrics .visualizer span:nth-child(5) { height: 44%; }
    .lyrics .visualizer span:nth-child(6) { height: 70%; }
    .lyrics .visualizer span:nth-child(7) { height: 92%; }
    .lyrics .visualizer span:nth-child(8) { height: 56%; }
    .lyrics .visualizer span:nth-child(9) { height: 38%; }
    .lyrics .visualizer span:nth-child(10) { height: 86%; }
    .lyrics .visualizer span:nth-child(11) { height: 62%; }
    .lyrics .visualizer span:nth-child(12) { height: 48%; }
    .lyrics .visualizer span:nth-child(13) { height: 76%; }
    .lyrics .visualizer span:nth-child(14) { height: 54%; }
    .lyrics .visualizer span:nth-child(15) { height: 90%; }
    .lyrics .visualizer span:nth-child(16) { height: 42%; }
    .lyrics .visualizer span:nth-child(17) { height: 68%; }
    .lyrics .visualizer span:nth-child(18) { height: 50%; }

    .card-kicker,
    .card-badge {
      position: absolute;
      z-index: 3;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(4, 8, 5, 0.66);
      color: #eefaf1;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
    }

    .card-kicker {
      left: 14px;
      bottom: 14px;
      text-transform: uppercase;
    }

    .card-badge {
      top: 14px;
      right: 14px;
    }

    .choice-top,
    .option-top,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mini-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .choice-card h2,
    .option-card h3 {
      line-height: 1.08;
    }

    .choice-card h2 {
      font-size: clamp(1.45rem, 2vw, 2.05rem);
    }

    .choice-copy,
    .option-desc {
      margin: 0;
      color: #c1d8c7;
      font-size: 0.94rem;
      line-height: 1.62;
    }

    .option-card h3 {
      max-width: 15ch;
      font-size: 1.38rem;
    }

    .section-left {
      display: grid;
      gap: 12px;
    }

    .section-title {
      max-width: 20ch;
      font-size: clamp(1.8rem, 2.6vw, 2.6rem);
      line-height: 1.06;
      text-wrap: balance;
    }

    .step-copy {
      max-width: 780px;
      margin: 0;
      font-size: 1rem;
    }

    .result-layout {
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      margin-top: 26px;
      align-items: start;
    }

    .summary-card,
    .result-box {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-item {
      border-radius: 18px;
      border: 1px solid rgba(96, 255, 154, 0.12);
      background: rgba(9, 17, 11, 0.82);
      padding: 12px 14px;
    }

    .summary-item strong {
      display: block;
      margin-bottom: 7px;
      color: #92efaf;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary-item span {
      display: block;
      color: #f5fff7;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.38;
    }

    .profile-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .profile-btn {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 15px;
      white-space: nowrap;
    }

    .profile-btn.active {
      background: rgba(96, 255, 154, 0.12);
      border-color: rgba(96, 255, 154, 0.28);
      color: #ecfff1;
    }

    .system-box {
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(4, 8, 5, 0.6);
      padding: 18px;
      white-space: pre-wrap;
      font-size: 0.93rem;
      max-height: 420px;
      overflow: auto;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    .copy-state {
      min-height: 24px;
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 5, 3, 0.72);
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(640px, calc(100vw - 32px));
      border-radius: 30px;
      border: 1px solid rgba(96, 255, 154, 0.16);
      background:
        linear-gradient(180deg, rgba(9, 17, 11, 0.98), rgba(5, 10, 7, 0.98)),
        linear-gradient(135deg, rgba(244, 177, 93, 0.05), transparent 60%);
      box-shadow: var(--shadow);
      padding: 26px;
      display: grid;
      gap: 14px;
    }

    .modal h3 {
      font-size: 1.42rem;
    }

    .modal textarea {
      width: 100%;
      min-height: 150px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(2, 6, 4, 0.9);
      color: var(--text);
      padding: 14px 16px;
      resize: vertical;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-copy-wrap,
      .hero-media {
        min-height: auto;
      }

      .hero-media {
        height: 310px;
      }

      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .result-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .shell {
        width: min(100vw - 20px, 680px);
        padding: 14px 0 28px;
      }

      .topbar {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
      }

      .home-pill {
        grid-column: 1;
        grid-row: 1;
      }

      .youtube-link {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        width: auto;
        min-height: 46px;
        padding: 0 14px;
      }

      .mode-links {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .mode-links::-webkit-scrollbar {
        display: none;
      }

      .mode-pill {
        min-width: max-content;
        min-height: 46px;
        flex: 0 0 auto;
        padding: 0 15px;
      }

      .screen {
        padding: 24px 18px;
      }

      .floating-back {
        position: static;
        width: 58px;
        height: 58px;
        border-radius: 18px;
        margin: 0 0 14px;
        font-size: 1.35rem;
      }

      .hero-title {
        font-size: clamp(2rem, 10vw, 3.4rem);
      }

      .hero-media {
        height: 240px;
      }

      .signal-strip,
      .mode-grid {
        grid-template-columns: 1fr;
      }

      .cards-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .summary-card,
      .result-box {
        padding: 18px;
      }

      .profile-tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .profile-tabs::-webkit-scrollbar {
        display: none;
      }

      .action-row,
      .modal-actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .mode-links {
        gap: 6px;
        justify-content: space-between;
      }

      .mode-pill {
        min-height: 42px;
        padding: 0 10px;
        font-size: 0.88rem;
      }

      .youtube-link {
        justify-self: stretch;
      }

      .screen {
        border-radius: 28px;
      }

      .hero-title,
      .section-title {
        font-size: clamp(1.75rem, 9vw, 2.5rem);
        line-height: 1.06;

            title: "목소리는 어떻게 잡을까요?",
            copy: "보컬 성격을 정하면 가사 어미와 멜로디 밀도가 달라집니다.",
            detailPrompt: "보컬 성별, 톤, 코러스 느낌이 있으면 적어주세요.",
            detailPlaceholder: "예: 낮고 부드러운 남성 보컬, 후렴에는 얇은 코러스",
            options: [
              { key: "female-soft", title: "부드러운 여성 보컬", desc: "맑고 감성적인 톤", brief: "soft female vocal with emotional clarity" },
              { key: "male-warm", title: "따뜻한 남성 보컬", desc: "낮고 안정적인 톤", brief: "warm male vocal with steady tone" },
              { key: "group", title: "그룹 / 코러스", desc: "여러 목소리가 쌓이는 느낌", brief: "group vocal or layered chorus" },
              { key: "spoken", title: "스포큰 / 랩", desc: "말하듯 리듬을 타는 보컬", brief: "spoken-word or light rap delivery" },
              { key: "instrumental", title: "보컬 없음", desc: "악기와 분위기만 중심", brief: "instrumental track without lead vocal" }
            ]
          },
          {
            key: "structure",
            label: "구조",
            title: "곡 구조는 어느 정도 필요해요?",
            copy: "음악 생성기는 구조 태그가 있으면 결과를 더 쉽게 따라갑니다.",
            detailPrompt: "원하는 길이나 후렴 반복 방식이 있으면 적어주세요.",
            detailPlaceholder: "예: 후렴은 두 번 반복, 마지막은 짧게 페이드아웃",
            options: [
              { key: "simple", title: "짧은 구조", desc: "Intro - Hook - Outro", brief: "short structure with intro, hook, and outro" },
              { key: "verse-chorus", title: "기본 노래 구조", desc: "Verse - Chorus - Verse - Chorus", brief: "classic verse and chorus song structure" },
              { key: "build", title: "점점 커지는 구조", desc: "작게 시작해서 후렴에서 확장", brief: "gradual build toward a larger chorus" },
              { key: "loop", title: "반복 루프", desc: "BGM처럼 자연스럽게 반복", brief: "loop-friendly structure for background use" }
            ]
          },
          {
            key: "language",
            label: "언어",
            title: "가사는 어떤 언어로 갈까요?",
            copy: "언어를 정하면 라임과 발음 난이도를 같이 맞출 수 있습니다.",
            detailPrompt: "꼭 들어갈 단어나 피하고 싶은 표현이 있으면 적어주세요.",
            detailPlaceholder: "예: Deno라는 이름은 한 번만 자연스럽게 들어가면 좋겠어",
            options: [
              { key: "korean", title: "한국어", desc: "자연스러운 한국어 가사", brief: "natural Korean lyrics" },
              { key: "english", title: "영어", desc: "짧고 부르기 쉬운 영어 가사", brief: "simple singable English lyrics" },
              { key: "mixed", title: "한영 믹스", desc: "한국어 중심에 영어 훅", brief: "Korean lyrics with a simple English hook" },
              { key: "no-lyrics", title: "가사 없음", desc: "음악 프롬프트만 정리", brief: "no lyrics, music prompt only" }
            ]
          }
        ]
      }
    };

    const state = {
      mode: "",
      stepIndex: 0,
      selections: {},
      activeProfile: ""
    };

    const chooserScreen = document.getElementById("chooserScreen");
    const stepScreen = document.getElementById("stepScreen");
    const resultScreen = document.getElementById("resultScreen");
    const backBtn = document.getElementById("backBtn");
    const flowEyebrow = document.getElementById("flowEyebrow");
    const stepTitle = document.getElementById("stepTitle");
    const stepCopy = document.getElementById("stepCopy");
    const stepBadge = document.getElementById("stepBadge");
    const cardsGrid = document.getElementById("cardsGrid");
    const resultEyebrow = document.getElementById("resultEyebrow");
    const resultTitle = document.getElementById("resultTitle");
    const resultCopy = document.getElementById("resultCopy");
    const summaryList = document.getElementById("summaryList");
    const profileTabs = document.getElementById("profileTabs");
    const profileCopy = document.getElementById("profileCopy");
    const systemPrompt = document.getElementById("systemPrompt");
    const copyBtn = document.getElementById("copyBtn");
    const copyState = document.getElementById("copyState");
    const detailModal = document.getElementById("detailModal");
    const modalBadge = document.getElementById("modalBadge");
    const modalTitle = document.getElementById("modalTitle");
    const modalCopy = document.getElementById("modalCopy");
    const modalInput = document.getElementById("modalInput");
    const skipDetailBtn = document.getElementById("skipDetailBtn");
    const saveDetailBtn = document.getElementById("saveDetailBtn");

    let pendingSelection = null;

    function hideAllScreens() {
      chooserScreen.classList.add("hidden");
      stepScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
    }

    function makeVisualizerClass(mode) {
      return mode === "music" ? "lyrics" : "voice";
    }

    function visualizerMarkup() {
      return Array.from({ length: 18 }, () => "<span></span>").join("");
    }

    function renderCardThumb(label, badge, mode) {
      return `
        <div class="card-thumb ${makeVisualizerClass(mode)}">
          <img class="card-photo" src="assets/cards/home/main/home-tts-builder.webp" alt="" width="1672" height="941" loading="lazy" decoding="async">
          <div class="visualizer" aria-hidden="true">${visualizerMarkup()}</div>
          <span class="card-kicker">${label}</span>
          <span class="card-badge">${badge}</span>
        </div>
      `;
    }

    function startMode(mode) {
      state.mode = mode;
      state.stepIndex = 0;
      state.selections = {};
      state.activeProfile = flows[mode].profiles[0].key;
      renderStep();
    }

    function renderStep() {
      const flow = flows[state.mode];
      const step = flow.steps[state.stepIndex];
      hideAllScreens();
      stepScreen.classList.remove("hidden");
      backBtn.classList.remove("hidden");
      flowEyebrow.textContent = flow.eyebrow;
      stepTitle.textContent = step.title;
      stepCopy.textContent = `${step.copy} 딱 맞는 카드가 없으면 직접 적기로 넘어가도 됩니다.`;
      stepBadge.textContent = `STEP ${state.stepIndex + 1}`;

      const directCard = `
        <button class="option-card" type="button" data-direct="${step.key}">
          <div class="card-thumb ${makeVisualizerClass(state.mode)}">
            <div class="visualizer" aria-hidden="true">${visualizerMarkup()}</div>
            <span class="card-kicker">DIRECT</span>
            <span class="card-badge">write</span>
          </div>
          <div class="option-top">
            <span class="mini-badge">DIRECT</span>
            <span class="mini-badge">WRITE</span>
          </div>
          <div>
            <h3>직접 적기</h3>
            <p class="option-desc">원하는 방향이 분명하면 한두 줄로 바로 적고 넘어가면 돼요.</p>
          </div>
        </button>
      `;

      const optionCards = step.options.map((option) => `
        <button class="option-card" type="button" data-option="${option.key}">
          ${renderCardThumb(step.label, option.key, state.mode)}
          <div class="option-top">
            <span class="mini-badge">${step.label}</span>
          </div>
          <div>
            <h3>${option.title}</h3>
            <p class="option-desc">${option.desc}</p>
          </div>
        </button>
      `).join("");

      cardsGrid.innerHTML = directCard + optionCards;

      cardsGrid.querySelectorAll("[data-option]").forEach((button) => {
        button.addEventListener("click", () => {
          const selected = step.options.find((option) => option.key === button.dataset.option);
          openDetailInput(step, selected, false);
        });
      });

      cardsGrid.querySelectorAll("[data-direct]").forEach((button) => {
        button.addEventListener("click", () => {
          openDetailInput(step, {
            key: "__direct__",
            title: "직접 입력",
            desc: "사용자 직접 입력",
            brief: ""
          }, true);
        });
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openDetailInput(step, option, direct) {
      pendingSelection = { step, option, direct };
      modalBadge.textContent = step.label;
      modalTitle.textContent = direct ? `${step.label} 직접 입력` : option.title;
      modalCopy.textContent = direct ? step.detailPrompt : `${option.desc} ${step.detailPrompt}`;
      modalInput.value = "";
      modalInput.placeholder = step.detailPlaceholder;
      detailModal.classList.add("open");
      detailModal.setAttribute("aria-hidden", "false");
      window.setTimeout(() => modalInput.focus(), 80);
    }

    function closeDetailInput() {
      detailModal.classList.remove("open");
      detailModal.setAttribute("aria-hidden", "true");
      pendingSelection = null;
    }

    function saveSelection(withDetail) {
      if (!pendingSelection) return;
      const { step, option, direct } = pendingSelection;
      const detail = withDetail ? modalInput.value.trim() : "";
      state.selections[step.key] = {
        key: direct ? "__direct__" : option.key,
        title: direct ? (detail || "직접 입력") : option.title,
        brief: direct ? detail : option.brief,
        detail
      };
      closeDetailInput();
      moveNext();
    }

    function moveNext() {
      const flow = flows[state.mode];
      if (state.stepIndex < flow.steps.length - 1) {
        state.stepIndex += 1;
        renderStep();
      } else {
        renderResult();
      }
    }

    function renderResult() {
      const flow = flows[state.mode];
      hideAllScreens();
      resultScreen.classList.remove("hidden");
      backBtn.classList.remove("hidden");
      resultEyebrow.textContent = flow.eyebrow;
      resultTitle.textContent = flow.resultTitle;
      resultCopy.textContent = flow.resultCopy;

      summaryList.innerHTML = flow.steps.map((step) => {
        const selected = state.selections[step.key];
        const extra = selected?.detail ? `<br><span>${selected.detail}</span>` : "";
        return `
          <div class="summary-item">
            <strong>${step.label}</strong>
            <span>${selected?.title || "미선택"}${extra}</span>
          </div>
        `;
      }).join("");

      profileTabs.innerHTML = flow.profiles.map((profile) => `
        <button class="ghost-btn profile-btn${profile.key === state.activeProfile ? " active" : ""}" type="button" data-profile="${profile.key}">
          ${profile.title}
        </button>
      `).join("");

      profileTabs.querySelectorAll("[data-profile]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeProfile = button.dataset.profile;
          renderResult();
        });
      });

      const profile = flow.profiles.find((item) => item.key === state.activeProfile) || flow.profiles[0];
      profileCopy.textContent = profile.copy;
      systemPrompt.textContent = buildPrompt(flow, profile);
      copyState.textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function buildBrief(flow) {
      return flow.steps.map((step) => {
        const selected = state.selections[step.key];
        if (!selected) return `${step.label}:`;
        const detail = selected.detail ? ` / user detail: ${selected.detail}` : "";
        return `${step.label}: ${selected.brief || selected.title}${detail}`;
      }).join("\n");
    }

    function buildPrompt(flow, profile) {
      const brief = buildBrief(flow);
      if (state.mode === "music") {
        return `You are a music prompt and lyric planning assistant for Korean creators.

Primary task:
${profile.instruction}

[Structured Brief]
${brief}

[Output Rules]
- Write in clear Korean unless the language choice requests English or mixed lyrics.
- Do not imitate a living artist, a specific singer, or a copyrighted song style. Describe genre, instruments, tempo, mood, vocal texture, and arrangement instead.
- If lyrics are requested, make them singable: short lines, repeatable hook, natural vowel flow, and no overloaded sentences.
- If the selected language is no lyrics, return only the music prompt, arrangement notes, and optional negative prompt.
- Separate the answer into: Music Prompt, Structure, Lyrics Draft, Vocal Direction, Production Notes.`;
      }

      return `You are a Korean TTS script and voice-direction assistant.

Primary task:
${profile.instruction}

[Structured Brief]
${brief}

[Output Rules]
- Write natural spoken Korean, not stiff written prose.
- Keep sentences short enough for TTS to read cleanly.
- Add pause, emphasis, and tone notes only where they help the voice sound natural.
- Avoid exaggerated ad-copy unless the selected purpose asks for an ad.
- If technical terms appear, include pronunciation hints or simpler alternatives when useful.
- Separate the answer into: Final Script, Voice Direction, Pace And Pauses, Optional Variations.`;
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      let ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (error) {
        ok = false;
      }
      textarea.remove();
      return ok;
    }

    async function copyPrompt() {
      const text = systemPrompt.textContent;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          copyState.textContent = "복사 완료";
          return;
        }
        if (fallbackCopyText(text)) {
          copyState.textContent = "복사 완료";
          return;
        }
        throw new Error("copy failed");
      } catch (error) {
        copyState.textContent = "복사가 막혔어요. 프롬프트 박스의 텍스트를 직접 선택해서 복사해주세요.";
      }
    }

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => startMode(button.dataset.mode));
    });

    backBtn.addEventListener("click", () => {
      if (!state.mode) return;
      if (!resultScreen.classList.contains("hidden")) {
        const flow = flows[state.mode];
        state.stepIndex = flow.steps.length - 1;
        renderStep();
        return;
      }
      if (!stepScreen.classList.contains("hidden") && state.stepIndex > 0) {
        const flow = flows[state.mode];
        const currentStep = flow.steps[state.stepIndex];
        delete state.selections[currentStep.key];
        state.stepIndex -= 1;
        renderStep();
        return;
      }
      state.mode = "";
      state.stepIndex = 0;
      state.selections = {};
      hideAllScreens();
      chooserScreen.classList.remove("hidden");
      backBtn.classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    skipDetailBtn.addEventListener("click", () => saveSelection(false));
    saveDetailBtn.addEventListener("click", () => saveSelection(true));
    copyBtn.addEventListener("click", copyPrompt);

    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) closeDetailInput();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && detailModal.classList.contains("open")) {
        closeDetailInput();
      }
    });
  </script>
</body>
</html>
