<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Prompt Master - Video</title>
  <meta
    name="description"
    content="Simple Prompt Master 동영상 프롬프트 생성기 준비 페이지입니다."
  />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #050806;
      --panel: rgba(10, 14, 12, 0.94);
      --line: rgba(87, 255, 149, 0.18);
      --line-strong: rgba(87, 255, 149, 0.32);
      --text: #f4fff7;
      --sub: #a2b7a8;
      --accent: #57ff95;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(87, 255, 149, 0.14), transparent 24%),
        radial-gradient(circle at 100% 12%, rgba(87, 255, 149, 0.06), transparent 20%),
        linear-gradient(180deg, #040705 0%, #09100b 52%, #060906 100%);
    }

    .panel {
      width: min(760px, 100%);
      padding: 34px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(10, 16, 12, 0.98), rgba(6, 10, 8, 0.98)),
        radial-gradient(circle at top left, rgba(87, 255, 149, 0.06), transparent 34%);
      box-shadow: var(--shadow);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .mark {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      color: var(--accent);
      background: rgba(87, 255, 149, 0.08);
      font-size: 30px;
      font-weight: 900;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(87, 255, 149, 0.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(30px, 6vw, 52px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--sub);
      font-size: 16px;
      line-height: 1.75;
    }

    .status-box {
      margin-top: 24px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #dbffe6;
      font-size: 15px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 13px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
      background: rgba(87, 255, 149, 0.08);
      font-weight: 700;
    }

    .button.secondary {
      background: rgba(255,255,255,0.03);
      color: var(--sub);
      border-color: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand">
      <div class="mark" aria-hidden="true">D</div>
      <div>
        <strong>Simple Prompt Master</strong><br />
        <span style="color: var(--sub); font-size: 13px;">Video Prompt Section</span>
      </div>
    </div>

    <div class="eyebrow">Updating</div>
    <h1>동영상 프롬프트 생성기는<br />지금 다듬는 중입니다</h1>
    <p>
      메인 구조와 페이지 연결은 먼저 열어두고, 세부 입력 항목과 생성 흐름은 다음 업데이트에서 채울 예정입니다.
      지금 단계에서는 사용자가 입구를 인지하고 들어와 볼 수 있는 상태까지만 정리해둔 페이지입니다.
    </p>

    <div class="status-box">
      현재 상태: 페이지 연결 완료<br />
      다음 단계: 동영상 전용 하위 항목 설계 후 본문 추가
    </div>

    <div class="actions">
      <a class="button" href="index.html">메인으로 돌아가기</a>
      <a class="button secondary" href="image.html">이미지 생성기 열기</a>
    </div>
  </main>
</body>
</html>
